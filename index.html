<!DOCTYPE html>
<html lang="en" class="bg-gray-950 text-gray-200">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSS Reader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gray: {
              950: "#0a0c14",
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Tailwind CDN doesn't include scrollbar styles */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
  </style>
</head>
<body class="min-h-screen font-sans">

<!-- ── Settings Modal ───────────────────────────────────────────────────── -->
<div id="modal-backdrop"
     class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
  <div class="bg-gray-900 border border-gray-700 rounded-xl shadow-2xl w-full max-w-md p-6">
    <h2 class="text-lg font-semibold text-white mb-1">GitHub Credentials</h2>
    <p class="text-sm text-gray-400 mb-5 leading-relaxed">
      Read state is saved to a GitHub Gist. "Add Feed" commits to your repo.
      Provide a PAT with <span class="text-gray-200 font-medium">repo</span> +
      <span class="text-gray-200 font-medium">gist</span> scopes, and the ID of
      an existing Gist (create a blank one if needed).
    </p>

    <label class="block text-xs text-gray-400 mb-1" for="inp-token">Personal Access Token</label>
    <input id="inp-token" type="password" placeholder="ghp_…"
           class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-100
                  placeholder-gray-600 focus:outline-none focus:border-indigo-500 mb-4" />

    <label class="block text-xs text-gray-400 mb-1" for="inp-gist">Gist ID</label>
    <input id="inp-gist" type="text" placeholder="a1b2c3d4e5f6…"
           class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-100
                  placeholder-gray-600 focus:outline-none focus:border-indigo-500 mb-5" />

    <div id="modal-error" class="hidden text-xs text-red-400 mb-3"></div>

    <button id="btn-modal-save"
            class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-lg py-2 text-sm
                   transition-colors">
      Save &amp; Continue
    </button>
  </div>
</div>

<!-- ── Main Layout ───────────────────────────────────────────────────────── -->
<div class="max-w-3xl mx-auto px-4 py-8">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-xl font-bold text-white tracking-tight">RSS Reader</h1>
    <div class="flex items-center gap-2">
      <span id="status-badge"
            class="text-xs text-gray-500 px-2 py-1 rounded-md bg-gray-900 border border-gray-800">
        Loading…
      </span>
      <button id="btn-refresh"
              class="text-xs bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300
                     px-3 py-1.5 rounded-lg transition-colors">
        Refresh
      </button>
      <button id="btn-settings"
              class="text-xs bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300
                     px-3 py-1.5 rounded-lg transition-colors">
        Settings
      </button>
    </div>
  </div>

  <!-- Add Feed -->
  <details class="mb-6 group">
    <summary class="cursor-pointer text-sm text-indigo-400 hover:text-indigo-300 select-none
                    list-none flex items-center gap-1">
      <svg class="w-4 h-4 transition-transform group-open:rotate-90" fill="none"
           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
      </svg>
      Add Feed
    </summary>
    <div class="mt-3 bg-gray-900 border border-gray-700 rounded-xl p-4">
      <div class="flex gap-2 flex-wrap">
        <input id="inp-feed-url" type="url" placeholder="https://example.com/feed.xml"
               class="flex-1 min-w-0 bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-sm
                      text-gray-100 placeholder-gray-600 focus:outline-none focus:border-indigo-500" />
        <select id="inp-feed-type"
                class="bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-100
                       focus:outline-none focus:border-indigo-500">
          <option value="rss">RSS</option>
          <option value="scrape">Scrape</option>
        </select>
        <button id="btn-add-feed"
                class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium px-4 py-2
                       rounded-lg transition-colors whitespace-nowrap">
          Add Feed
        </button>
      </div>
      <div id="add-feed-msg" class="hidden mt-2 text-xs rounded-md px-3 py-2"></div>
    </div>
  </details>

  <!-- Filter bar -->
  <div class="flex items-center gap-2 mb-5 flex-wrap">
    <span class="text-xs text-gray-500 mr-1">Show:</span>
    <button data-filter="all"
            class="filter-btn text-xs px-3 py-1 rounded-full border transition-colors
                   bg-indigo-600 border-indigo-500 text-white">
      All
    </button>
    <button data-filter="unread"
            class="filter-btn text-xs px-3 py-1 rounded-full border transition-colors
                   bg-gray-800 border-gray-700 text-gray-400 hover:border-gray-500">
      Unread
    </button>
    <button data-filter="read"
            class="filter-btn text-xs px-3 py-1 rounded-full border transition-colors
                   bg-gray-800 border-gray-700 text-gray-400 hover:border-gray-500">
      Read
    </button>
    <button id="btn-mark-all-read"
            class="ml-auto text-xs bg-gray-800 hover:bg-gray-700 border border-gray-700
                   text-gray-400 px-3 py-1 rounded-full transition-colors">
      Mark all read
    </button>
  </div>

  <!-- Feed list -->
  <div id="feed-container" class="space-y-6"></div>
  <p id="empty-msg" class="hidden text-sm text-gray-600 mt-8 text-center">No items to show.</p>

</div><!-- /main -->

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const REPO_OWNER    = "ubikcan";
const REPO_NAME     = "rss-reader";
const CONFIG_PATH   = "config.json";
const FEEDS_PATH    = "feeds.json";
const GIST_FILENAME = "rss_read_state.json";

const LS_TOKEN  = "rss_gh_token";
const LS_GIST   = "rss_gist_id";

// ── State ──────────────────────────────────────────────────────────────────
let allItems  = [];
let readState = {};   // { [link]: true }
let filter    = "all";
let saveTimer = null;

// ── Credentials ────────────────────────────────────────────────────────────
const creds = () => ({
  token:  localStorage.getItem(LS_TOKEN) || "",
  gistId: localStorage.getItem(LS_GIST)  || "",
});

// ── GitHub helpers ─────────────────────────────────────────────────────────
async function ghFetch(url, opts = {}) {
  const { token } = creds();
  const res = await fetch(url, {
    ...opts,
    headers: {
      Authorization: `token ${token}`,
      Accept: "application/vnd.github+json",
      "Content-Type": "application/json",
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.message || `HTTP ${res.status}`);
  }
  return res.json();
}

// ── Gist read/write ────────────────────────────────────────────────────────
async function loadReadState() {
  const { token, gistId } = creds();
  if (!token || !gistId) return;
  const data = await ghFetch(`https://api.github.com/gists/${gistId}`);
  const file = data.files?.[GIST_FILENAME];
  if (file?.content) {
    try { readState = JSON.parse(file.content); } catch { readState = {}; }
  }
}

async function saveReadState() {
  const { token, gistId } = creds();
  if (!token || !gistId) return;
  await ghFetch(`https://api.github.com/gists/${gistId}`, {
    method: "PATCH",
    body: JSON.stringify({
      files: { [GIST_FILENAME]: { content: JSON.stringify(readState) } },
    }),
  });
  setStatus(`Saved · ${new Date().toLocaleTimeString()}`);
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveReadState().catch(e => setStatus(e.message, true)), 1200);
}

// ── GitHub Contents API (config.json) ──────────────────────────────────────
async function addFeedToConfig(url, type) {
  const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CONFIG_PATH}`;

  // Get current file (need SHA for update)
  const current = await ghFetch(apiUrl);
  const decoded = JSON.parse(atob(current.content.replace(/\n/g, "")));

  // Check for duplicate
  if (decoded.feeds.some(f => f.url === url)) {
    throw new Error("This URL is already in config.json.");
  }

  decoded.feeds.push({ url, type });

  await ghFetch(apiUrl, {
    method: "PUT",
    body: JSON.stringify({
      message: `chore: add ${type} feed ${url}`,
      content: btoa(JSON.stringify(decoded, null, 2) + "\n"),
      sha: current.sha,
    }),
  });
}

// ── Feed loading ───────────────────────────────────────────────────────────
async function loadFeeds() {
  const res = await fetch(`${FEEDS_PATH}?_=${Date.now()}`);
  if (!res.ok) throw new Error(`feeds.json not found (${res.status})`);
  allItems = await res.json();
  allItems.sort((a, b) => {
    const da = a.published ? new Date(a.published) : 0;
    const db = b.published ? new Date(b.published) : 0;
    return db - da;
  });
}

// ── Render ─────────────────────────────────────────────────────────────────
function formatDate(str) {
  if (!str) return "";
  const d = new Date(str);
  return isNaN(d) ? "" : d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}

function sourceLabel(src) {
  try { return new URL(src).hostname; } catch { return src; }
}

function render() {
  const container = document.getElementById("feed-container");
  const emptyMsg  = document.getElementById("empty-msg");
  container.innerHTML = "";

  const visible = allItems.filter(item => {
    if (filter === "unread") return !readState[item.link];
    if (filter === "read")   return  readState[item.link];
    return true;
  });

  // Group by source, preserving insertion (newest-first) order
  const groups = new Map();
  for (const item of visible) {
    if (!groups.has(item.source)) groups.set(item.source, []);
    groups.get(item.source).push(item);
  }

  emptyMsg.classList.toggle("hidden", groups.size > 0);

  for (const [source, items] of groups) {
    const section = document.createElement("div");

    // Source header
    const header = document.createElement("div");
    header.className = "text-xs font-semibold uppercase tracking-widest text-gray-500 " +
                       "border-b border-gray-800 pb-1.5 mb-1";
    header.textContent = sourceLabel(source);
    section.appendChild(header);

    for (const item of items) {
      const isRead = !!readState[item.link];

      const row = document.createElement("div");
      row.className = "flex items-start gap-3 py-2 border-b border-gray-900 group";

      // Toggle button
      const btn = document.createElement("button");
      btn.title = isRead ? "Mark unread" : "Mark read";
      btn.className = "mt-0.5 flex-shrink-0 w-4 h-4 rounded border transition-colors " +
        (isRead
          ? "bg-indigo-600 border-indigo-500"
          : "border-gray-600 group-hover:border-indigo-500");
      btn.innerHTML = isRead
        ? `<svg viewBox="0 0 12 12" fill="none" class="w-full h-full p-0.5">
             <path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8"
                   stroke-linecap="round" stroke-linejoin="round"/>
           </svg>`
        : "";

      btn.addEventListener("click", () => {
        readState[item.link] = !readState[item.link];
        if (!readState[item.link]) delete readState[item.link];
        scheduleSave();
        render();
      });

      // Text block
      const text = document.createElement("div");
      text.className = "flex-1 min-w-0";

      const link = document.createElement("a");
      link.href = item.link;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.textContent = item.title || item.link;
      link.className = "text-sm leading-snug block truncate transition-colors " +
        (isRead ? "text-gray-600 hover:text-gray-500" : "text-gray-200 hover:text-white");

      const meta = document.createElement("span");
      meta.className = "text-xs text-gray-600 mt-0.5 block";
      meta.textContent = formatDate(item.published);

      text.append(link, meta);
      row.append(btn, text);
      section.appendChild(row);
    }

    container.appendChild(section);
  }

  // Update status
  const unread = allItems.filter(i => !readState[i.link]).length;
  setStatus(`${unread} unread · ${allItems.length} total`);
}

// ── Filter buttons ──────────────────────────────────────────────────────────
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    filter = btn.dataset.filter;
    document.querySelectorAll(".filter-btn").forEach(b => {
      const active = b === btn;
      b.className = b.className
        .replace(/bg-\S+ border-\S+ text-\S+/g, "")
        .trim() + (active
          ? " bg-indigo-600 border-indigo-500 text-white"
          : " bg-gray-800 border-gray-700 text-gray-400 hover:border-gray-500");
    });
    render();
  });
});

// ── Mark all read ──────────────────────────────────────────────────────────
document.getElementById("btn-mark-all-read").addEventListener("click", () => {
  allItems.forEach(i => { readState[i.link] = true; });
  scheduleSave();
  render();
});

// ── Refresh ────────────────────────────────────────────────────────────────
document.getElementById("btn-refresh").addEventListener("click", async () => {
  setStatus("Refreshing…");
  try {
    await loadFeeds();
    render();
  } catch (e) {
    setStatus(e.message, true);
  }
});

// ── Add Feed ───────────────────────────────────────────────────────────────
document.getElementById("btn-add-feed").addEventListener("click", async () => {
  const url  = document.getElementById("inp-feed-url").value.trim();
  const type = document.getElementById("inp-feed-type").value;
  const msg  = document.getElementById("add-feed-msg");

  if (!url) return showFeedMsg("Please enter a URL.", false);

  const btn = document.getElementById("btn-add-feed");
  btn.disabled = true;
  btn.textContent = "Adding…";

  try {
    await addFeedToConfig(url, type);
    document.getElementById("inp-feed-url").value = "";
    showFeedMsg(`Added ${type} feed. The workflow will fetch it on next run.`, true);
  } catch (e) {
    showFeedMsg(e.message, false);
  } finally {
    btn.disabled = false;
    btn.textContent = "Add Feed";
  }
});

function showFeedMsg(text, ok) {
  const el = document.getElementById("add-feed-msg");
  el.textContent = text;
  el.className = `mt-2 text-xs rounded-md px-3 py-2 ${ok
    ? "bg-green-900/40 text-green-400 border border-green-800"
    : "bg-red-900/40 text-red-400 border border-red-800"}`;
  el.classList.remove("hidden");
}

// ── Settings modal ─────────────────────────────────────────────────────────
function openModal() {
  const { token, gistId } = creds();
  document.getElementById("inp-token").value = token;
  document.getElementById("inp-gist").value  = gistId;
  document.getElementById("modal-error").classList.add("hidden");
  document.getElementById("modal-backdrop").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modal-backdrop").classList.add("hidden");
}

document.getElementById("btn-settings").addEventListener("click", openModal);

document.getElementById("modal-backdrop").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-backdrop")) closeModal();
});

document.getElementById("btn-modal-save").addEventListener("click", async () => {
  const token  = document.getElementById("inp-token").value.trim();
  const gistId = document.getElementById("inp-gist").value.trim();
  const errEl  = document.getElementById("modal-error");

  if (!token || !gistId) {
    errEl.textContent = "Both fields are required.";
    errEl.classList.remove("hidden");
    return;
  }

  localStorage.setItem(LS_TOKEN, token);
  localStorage.setItem(LS_GIST,  gistId);
  closeModal();
  setStatus("Loading read state…");

  try {
    await loadReadState();
    render();
  } catch (e) {
    setStatus(e.message, true);
  }
});

// ── Utilities ──────────────────────────────────────────────────────────────
function setStatus(msg, isError = false) {
  const el = document.getElementById("status-badge");
  el.textContent = msg;
  el.className = `text-xs px-2 py-1 rounded-md border ${isError
    ? "text-red-400 bg-red-950/40 border-red-900"
    : "text-gray-500 bg-gray-900 border-gray-800"}`;
}

// ── Boot ───────────────────────────────────────────────────────────────────
(async () => {
  const { token, gistId } = creds();
  if (!token || !gistId) openModal();

  setStatus("Loading…");
  try {
    await Promise.all([loadFeeds(), loadReadState()]);
    render();
  } catch (e) {
    setStatus(e.message, true);
  }
})();
</script>
</body>
</html>
