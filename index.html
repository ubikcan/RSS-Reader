<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSS Reader</title>
  <!-- Apply theme before paint to avoid flash -->
  <script>
    if (localStorage.getItem("rss_theme") === "dark") {
      document.documentElement.classList.add("dark");
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            gray: { 950: "#0a0c14" }
          }
        }
      }
    }
  </script>
  <style>
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }

    /* Unsubscribe buttons: hidden until unlocked class is on <html> */
    .unsub-btn { display: none; }
    html.unlocked .unsub-btn { display: inline-flex; }
  </style>
</head>
<body class="min-h-screen font-sans bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-200">

<!-- ── Password Modal ───────────────────────────────────────────────────── -->
<div id="pw-backdrop"
     class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
  <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700
              rounded-xl shadow-2xl w-full max-w-sm p-6">
    <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Enter Password</h2>
    <input id="inp-password" type="password" placeholder="Password"
           class="w-full bg-gray-100 dark:bg-gray-950 border border-gray-300 dark:border-gray-700
                  rounded-lg px-3 py-2 text-sm text-gray-900 dark:text-gray-100
                  placeholder-gray-400 dark:placeholder-gray-600
                  focus:outline-none focus:border-indigo-500 mb-3" />
    <div id="pw-error" class="hidden text-xs text-red-500 dark:text-red-400 mb-3">Incorrect password.</div>
    <div class="flex gap-2">
      <button id="btn-pw-cancel"
              class="flex-1 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700
                     border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300
                     font-medium rounded-lg py-2 text-sm transition-colors">
        Cancel
      </button>
      <button id="btn-pw-submit"
              class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-lg
                     py-2 text-sm transition-colors">
        Unlock
      </button>
    </div>
  </div>
</div>

<!-- ── Settings Modal ───────────────────────────────────────────────────── -->
<div id="modal-backdrop"
     class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
  <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700
              rounded-xl shadow-2xl w-full max-w-md p-6">
    <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-1">GitHub Credentials</h2>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-5 leading-relaxed">
      Read state is saved to a GitHub Gist. "Add Feed" commits to your repo.
      Provide a PAT with <span class="text-gray-800 dark:text-gray-200 font-medium">repo</span> +
      <span class="text-gray-800 dark:text-gray-200 font-medium">gist</span> scopes, and the ID of
      an existing Gist (create a blank one if needed).
    </p>

    <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1" for="inp-token">Personal Access Token</label>
    <input id="inp-token" type="password" placeholder="ghp_…"
           class="w-full bg-gray-100 dark:bg-gray-950 border border-gray-300 dark:border-gray-700
                  rounded-lg px-3 py-2 text-sm text-gray-900 dark:text-gray-100
                  placeholder-gray-400 dark:placeholder-gray-600
                  focus:outline-none focus:border-indigo-500 mb-4" />

    <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1" for="inp-gist">Gist ID</label>
    <input id="inp-gist" type="text" placeholder="a1b2c3d4e5f6…"
           class="w-full bg-gray-100 dark:bg-gray-950 border border-gray-300 dark:border-gray-700
                  rounded-lg px-3 py-2 text-sm text-gray-900 dark:text-gray-100
                  placeholder-gray-400 dark:placeholder-gray-600
                  focus:outline-none focus:border-indigo-500 mb-5" />

    <div id="modal-error" class="hidden text-xs text-red-500 dark:text-red-400 mb-3"></div>

    <button id="btn-modal-save"
            class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-lg
                   py-2 text-sm transition-colors">
      Save &amp; Continue
    </button>
  </div>
</div>

<!-- ── Main Layout ───────────────────────────────────────────────────────── -->
<div class="max-w-3xl mx-auto px-4 py-8">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-xl font-bold tracking-tight">RSS Reader</h1>
    <div class="flex items-center gap-2">
      <span id="status-badge"
            class="text-xs text-gray-500 px-2 py-1 rounded-md
                   bg-gray-100 dark:bg-gray-900 border border-gray-200 dark:border-gray-800">
        Loading…
      </span>
      <button id="btn-refresh"
              class="text-xs bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700
                     border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-300
                     px-3 py-1.5 rounded-lg transition-colors">
        Refresh
      </button>
      <!-- Light/Dark toggle -->
      <button id="btn-theme"
              class="text-xs bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700
                     border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-300
                     px-2 py-1.5 rounded-lg transition-colors"
              title="Toggle light/dark mode">
        <!-- icon injected by JS -->
      </button>
      <button id="btn-settings"
              class="text-xs bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700
                     border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-300
                     px-3 py-1.5 rounded-lg transition-colors">
        Settings
      </button>
    </div>
  </div>

  <!-- Add Feed -->
  <details class="mb-6 group">
    <summary class="cursor-pointer text-sm text-indigo-500 hover:text-indigo-400 select-none
                    list-none flex items-center gap-1">
      <svg class="w-4 h-4 transition-transform group-open:rotate-90" fill="none"
           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
      </svg>
      Add Feed
    </summary>
    <div class="mt-3 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl p-4">
      <div class="flex gap-2 flex-wrap">
        <input id="inp-feed-url" type="url" placeholder="https://example.com/feed.xml"
               class="flex-1 min-w-0 bg-gray-100 dark:bg-gray-950 border border-gray-300 dark:border-gray-700
                      rounded-lg px-3 py-2 text-sm text-gray-900 dark:text-gray-100
                      placeholder-gray-400 dark:placeholder-gray-600
                      focus:outline-none focus:border-indigo-500" />
        <select id="inp-feed-type"
                class="bg-gray-100 dark:bg-gray-950 border border-gray-300 dark:border-gray-700
                       rounded-lg px-3 py-2 text-sm text-gray-900 dark:text-gray-100
                       focus:outline-none focus:border-indigo-500">
          <option value="rss">RSS</option>
          <option value="scrape">Scrape</option>
        </select>
        <button id="btn-add-feed"
                class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium px-4 py-2
                       rounded-lg transition-colors whitespace-nowrap">
          Add Feed
        </button>
      </div>
      <div id="add-feed-msg" class="hidden mt-2 text-xs rounded-md px-3 py-2"></div>
    </div>
  </details>

  <!-- Filter bar -->
  <div class="flex items-center gap-2 mb-5 flex-wrap">
    <span class="text-xs text-gray-500 mr-1">Show:</span>
    <button data-filter="all"
            class="filter-btn text-xs px-3 py-1 rounded-full border transition-colors
                   bg-indigo-600 border-indigo-500 text-white">
      All
    </button>
    <button data-filter="unread"
            class="filter-btn text-xs px-3 py-1 rounded-full border transition-colors
                   bg-gray-100 dark:bg-gray-800 border-gray-200 dark:border-gray-700
                   text-gray-500 dark:text-gray-400 hover:border-gray-400 dark:hover:border-gray-500">
      Unread
    </button>
    <button data-filter="read"
            class="filter-btn text-xs px-3 py-1 rounded-full border transition-colors
                   bg-gray-100 dark:bg-gray-800 border-gray-200 dark:border-gray-700
                   text-gray-500 dark:text-gray-400 hover:border-gray-400 dark:hover:border-gray-500">
      Read
    </button>
    <button id="btn-mark-all-read"
            class="ml-auto text-xs bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700
                   border border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400
                   px-3 py-1 rounded-full transition-colors">
      Mark all read
    </button>
  </div>

  <!-- Feed list -->
  <div id="feed-container" class="space-y-6"></div>
  <p id="empty-msg" class="hidden text-sm text-gray-400 mt-8 text-center">No items to show.</p>

</div><!-- /main -->

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const REPO_OWNER    = "ubikcan";
const REPO_NAME     = "rss-reader";
const CONFIG_PATH   = "config.json";
const FEEDS_PATH    = "feeds.json";
const GIST_FILENAME = "rss_read_state.json";

const LS_TOKEN  = "rss_gh_token";
const LS_GIST   = "rss_gist_id";
const LS_THEME  = "rss_theme";

// ── Password protection ────────────────────────────────────────────────────
const CONTROLS_PASSWORD = "changeme";
const SS_UNLOCKED = "rss_unlocked";

function requireAuth() {
  if (sessionStorage.getItem(SS_UNLOCKED) === "1") return Promise.resolve();

  return new Promise((resolve, reject) => {
    const backdrop = document.getElementById("pw-backdrop");
    const input    = document.getElementById("inp-password");
    const errEl    = document.getElementById("pw-error");

    input.value = "";
    errEl.classList.add("hidden");
    backdrop.classList.remove("hidden");
    input.focus();

    function cleanup() {
      backdrop.classList.add("hidden");
      document.removeEventListener("keydown", onKey);
    }

    function attempt() {
      if (input.value === CONTROLS_PASSWORD) {
        sessionStorage.setItem(SS_UNLOCKED, "1");
        // Show unsubscribe buttons for this session
        document.documentElement.classList.add("unlocked");
        cleanup();
        resolve();
      } else {
        errEl.classList.remove("hidden");
        input.value = "";
        input.focus();
      }
    }

    function cancel() {
      cleanup();
      reject(new Error("cancelled"));
    }

    function onKey(e) {
      if (e.key === "Enter")  attempt();
      if (e.key === "Escape") cancel();
    }

    document.getElementById("btn-pw-submit").onclick = attempt;
    document.getElementById("btn-pw-cancel").onclick = cancel;
    backdrop.onclick = e => { if (e.target === backdrop) cancel(); };
    document.addEventListener("keydown", onKey);
  });
}

// ── State ──────────────────────────────────────────────────────────────────
let allItems  = [];
let readState = {};
let filter    = "all";
let saveTimer = null;

// ── Credentials ────────────────────────────────────────────────────────────
const creds = () => ({
  token:  localStorage.getItem(LS_TOKEN) || "",
  gistId: localStorage.getItem(LS_GIST)  || "",
});

// ── GitHub helpers ─────────────────────────────────────────────────────────
async function ghFetch(url, opts = {}) {
  const { token } = creds();
  const res = await fetch(url, {
    ...opts,
    headers: {
      Authorization: `token ${token}`,
      Accept: "application/vnd.github+json",
      "Content-Type": "application/json",
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.message || `HTTP ${res.status}`);
  }
  return res.json();
}

// ── Gist read/write ────────────────────────────────────────────────────────
async function loadReadState() {
  const { token, gistId } = creds();
  if (!token || !gistId) return;
  const data = await ghFetch(`https://api.github.com/gists/${gistId}`);
  const file = data.files?.[GIST_FILENAME];
  if (file?.content) {
    try { readState = JSON.parse(file.content); } catch { readState = {}; }
  }
}

async function saveReadState() {
  const { token, gistId } = creds();
  if (!token || !gistId) return;
  await ghFetch(`https://api.github.com/gists/${gistId}`, {
    method: "PATCH",
    body: JSON.stringify({
      files: { [GIST_FILENAME]: { content: JSON.stringify(readState) } },
    }),
  });
  setStatus(`Saved · ${new Date().toLocaleTimeString()}`);
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveReadState().catch(e => setStatus(e.message, true)), 1200);
}

// ── GitHub Contents API (config.json) ──────────────────────────────────────
async function addFeedToConfig(url, type) {
  const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CONFIG_PATH}`;
  const current = await ghFetch(apiUrl);
  const decoded = JSON.parse(atob(current.content.replace(/\n/g, "")));

  if (decoded.feeds.some(f => f.url === url)) {
    throw new Error("This URL is already in config.json.");
  }

  decoded.feeds.push({ url, type });

  await ghFetch(apiUrl, {
    method: "PUT",
    body: JSON.stringify({
      message: `chore: add ${type} feed ${url}`,
      content: btoa(JSON.stringify(decoded, null, 2) + "\n"),
      sha: current.sha,
    }),
  });
}

async function removeFeedFromConfig(feedUrl) {
  const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CONFIG_PATH}`;
  const current = await ghFetch(apiUrl);
  const decoded = JSON.parse(atob(current.content.replace(/\n/g, "")));
  decoded.feeds = decoded.feeds.filter(f => f.url !== feedUrl);
  await ghFetch(apiUrl, {
    method: "PUT",
    body: JSON.stringify({
      message: `chore: remove feed ${feedUrl}`,
      content: btoa(JSON.stringify(decoded, null, 2) + "\n"),
      sha: current.sha,
    }),
  });
}

// ── Feed loading ───────────────────────────────────────────────────────────
async function loadFeeds() {
  const res = await fetch(`${FEEDS_PATH}?_=${Date.now()}`);
  if (!res.ok) throw new Error(`feeds.json not found (${res.status})`);
  allItems = await res.json();
  allItems.sort((a, b) => {
    const da = a.published ? new Date(a.published) : 0;
    const db = b.published ? new Date(b.published) : 0;
    return db - da;
  });
}

// ── Render ─────────────────────────────────────────────────────────────────
function formatDate(str) {
  if (!str) return "";
  const d = new Date(str);
  return isNaN(d) ? "" : d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}

function sourceLabel(src) {
  try { return new URL(src).hostname; } catch { return src; }
}

function render() {
  const container = document.getElementById("feed-container");
  const emptyMsg  = document.getElementById("empty-msg");
  container.innerHTML = "";

  const visible = allItems.filter(item => {
    if (filter === "unread") return !readState[item.link];
    if (filter === "read")   return  readState[item.link];
    return true;
  });

  const groups = new Map();
  for (const item of visible) {
    if (!groups.has(item.source)) groups.set(item.source, []);
    groups.get(item.source).push(item);
  }

  emptyMsg.classList.toggle("hidden", groups.size > 0);

  for (const [source, items] of groups) {
    const section = document.createElement("div");

    // Source header row
    const header = document.createElement("div");
    header.className = "flex items-center justify-between border-b border-gray-200 dark:border-gray-800 pb-1.5 mb-1";

    const label = document.createElement("span");
    label.className = "text-xs font-semibold uppercase tracking-widest text-gray-400 dark:text-gray-500";
    label.textContent = sourceLabel(source);

    // Unsubscribe button (shown only when unlocked via CSS)
    const unsubBtn = document.createElement("button");
    unsubBtn.className = "unsub-btn items-center gap-1 text-xs text-red-500 dark:text-red-400 " +
      "hover:text-red-600 dark:hover:text-red-300 transition-colors px-2 py-0.5 rounded " +
      "border border-red-200 dark:border-red-900/60 hover:bg-red-50 dark:hover:bg-red-950/40";
    unsubBtn.textContent = "Unsubscribe";
    unsubBtn.addEventListener("click", async () => {
      try { await requireAuth(); } catch { return; }

      const displayName = sourceLabel(source);
      if (!confirm(`Are you sure you want to unsubscribe from ${displayName}?`)) return;

      unsubBtn.disabled = true;
      unsubBtn.textContent = "Removing…";

      try {
        await removeFeedFromConfig(source);
        const { token } = creds();
        await fetch(
          `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/update.yml/dispatches`,
          {
            method: "POST",
            headers: {
              Authorization: `token ${token}`,
              Accept: "application/vnd.github+json",
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ ref: "main" }),
          }
        );
        // Remove items from this source from local state
        allItems = allItems.filter(i => i.source !== source);
        render();
        setStatus("Unsubscribed. Feed list is updating — refresh in a minute or two.");
      } catch (e) {
        setStatus(e.message, true);
        unsubBtn.disabled = false;
        unsubBtn.textContent = "Unsubscribe";
      }
    });

    header.append(label, unsubBtn);
    section.appendChild(header);

    for (const item of items) {
      const isRead = !!readState[item.link];

      const row = document.createElement("div");
      row.className = "flex items-start gap-3 py-2 border-b border-gray-100 dark:border-gray-900 group";

      const btn = document.createElement("button");
      btn.title = isRead ? "Mark unread" : "Mark read";
      btn.className = "mt-0.5 flex-shrink-0 w-4 h-4 rounded border transition-colors " +
        (isRead
          ? "bg-indigo-600 border-indigo-500"
          : "border-gray-300 dark:border-gray-600 group-hover:border-indigo-500");
      btn.innerHTML = isRead
        ? `<svg viewBox="0 0 12 12" fill="none" class="w-full h-full p-0.5">
             <path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8"
                   stroke-linecap="round" stroke-linejoin="round"/>
           </svg>`
        : "";

      btn.addEventListener("click", async () => {
        try { await requireAuth(); } catch { return; }
        readState[item.link] = !readState[item.link];
        if (!readState[item.link]) delete readState[item.link];
        scheduleSave();
        render();
      });

      const text = document.createElement("div");
      text.className = "flex-1 min-w-0";

      const link = document.createElement("a");
      link.href = item.link;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.textContent = item.title || item.link;
      link.className = "text-sm leading-snug block truncate transition-colors " +
        (isRead
          ? "text-gray-400 dark:text-gray-600 hover:text-gray-500 dark:hover:text-gray-500"
          : "text-gray-800 dark:text-gray-200 hover:text-black dark:hover:text-white");

      const meta = document.createElement("span");
      meta.className = "text-xs text-gray-400 dark:text-gray-600 mt-0.5 block";
      meta.textContent = formatDate(item.published);

      text.append(link, meta);
      row.append(btn, text);
      section.appendChild(row);
    }

    container.appendChild(section);
  }

  const unread = allItems.filter(i => !readState[i.link]).length;
  setStatus(`${unread} unread · ${allItems.length} total`);
}

// ── Filter buttons ──────────────────────────────────────────────────────────
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    filter = btn.dataset.filter;
    document.querySelectorAll(".filter-btn").forEach(b => {
      const active = b === btn;
      b.className = b.className
        .replace(/bg-\S+ border-\S+ text-\S+(\s+hover:\S+)?/g, "")
        .trim() + (active
          ? " bg-indigo-600 border-indigo-500 text-white"
          : " bg-gray-100 dark:bg-gray-800 border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 hover:border-gray-400 dark:hover:border-gray-500");
    });
    render();
  });
});

// ── Mark all read ──────────────────────────────────────────────────────────
document.getElementById("btn-mark-all-read").addEventListener("click", async () => {
  try { await requireAuth(); } catch { return; }
  allItems.forEach(i => { readState[i.link] = true; });
  scheduleSave();
  render();
});

// ── Refresh ────────────────────────────────────────────────────────────────
document.getElementById("btn-refresh").addEventListener("click", async () => {
  setStatus("Refreshing…");
  try {
    await loadFeeds();
    render();
  } catch (e) {
    setStatus(e.message, true);
  }
});

// ── Add Feed ───────────────────────────────────────────────────────────────
document.getElementById("btn-add-feed").addEventListener("click", async () => {
  try { await requireAuth(); } catch { return; }

  const url  = document.getElementById("inp-feed-url").value.trim();
  const type = document.getElementById("inp-feed-type").value;

  if (!url) return showFeedMsg("Please enter a URL.", false);

  const btn = document.getElementById("btn-add-feed");
  btn.disabled = true;
  btn.textContent = "Adding…";

  try {
    await addFeedToConfig(url, type);
    document.getElementById("inp-feed-url").value = "";
    showFeedMsg(`Added ${type} feed. The workflow will fetch it on next run.`, true);
  } catch (e) {
    showFeedMsg(e.message, false);
  } finally {
    btn.disabled = false;
    btn.textContent = "Add Feed";
  }
});

function showFeedMsg(text, ok) {
  const el = document.getElementById("add-feed-msg");
  el.textContent = text;
  el.className = `mt-2 text-xs rounded-md px-3 py-2 ${ok
    ? "bg-green-50 dark:bg-green-900/40 text-green-700 dark:text-green-400 border border-green-200 dark:border-green-800"
    : "bg-red-50 dark:bg-red-900/40 text-red-600 dark:text-red-400 border border-red-200 dark:border-red-800"}`;
  el.classList.remove("hidden");
}

// ── Settings modal ─────────────────────────────────────────────────────────
function openModal() {
  const { token, gistId } = creds();
  document.getElementById("inp-token").value = token;
  document.getElementById("inp-gist").value  = gistId;
  document.getElementById("modal-error").classList.add("hidden");
  document.getElementById("modal-backdrop").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modal-backdrop").classList.add("hidden");
}

document.getElementById("btn-settings").addEventListener("click", openModal);

document.getElementById("modal-backdrop").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-backdrop")) closeModal();
});

document.getElementById("btn-modal-save").addEventListener("click", async () => {
  const token  = document.getElementById("inp-token").value.trim();
  const gistId = document.getElementById("inp-gist").value.trim();
  const errEl  = document.getElementById("modal-error");

  if (!token || !gistId) {
    errEl.textContent = "Both fields are required.";
    errEl.classList.remove("hidden");
    return;
  }

  localStorage.setItem(LS_TOKEN, token);
  localStorage.setItem(LS_GIST,  gistId);
  closeModal();
  setStatus("Loading read state…");

  try {
    await loadReadState();
    render();
  } catch (e) {
    setStatus(e.message, true);
  }
});

// ── Theme toggle ───────────────────────────────────────────────────────────
const SUN_ICON  = `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
  <circle cx="12" cy="12" r="5"/>
  <path stroke-linecap="round" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
</svg>`;
const MOON_ICON = `<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
  <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
</svg>`;

function applyTheme(dark) {
  document.documentElement.classList.toggle("dark", dark);
  document.getElementById("btn-theme").innerHTML = dark ? SUN_ICON : MOON_ICON;
  document.getElementById("btn-theme").title = dark ? "Switch to light mode" : "Switch to dark mode";
}

document.getElementById("btn-theme").addEventListener("click", () => {
  const isDark = document.documentElement.classList.contains("dark");
  applyTheme(!isDark);
  localStorage.setItem(LS_THEME, !isDark ? "dark" : "light");
});

// ── Utilities ──────────────────────────────────────────────────────────────
function setStatus(msg, isError = false) {
  const el = document.getElementById("status-badge");
  el.textContent = msg;
  el.className = `text-xs px-2 py-1 rounded-md border ${isError
    ? "text-red-500 dark:text-red-400 bg-red-50 dark:bg-red-950/40 border-red-200 dark:border-red-900"
    : "text-gray-500 bg-gray-100 dark:bg-gray-900 border-gray-200 dark:border-gray-800"}`;
}

// ── Boot ───────────────────────────────────────────────────────────────────
(async () => {
  // Restore unlocked state for this session
  if (sessionStorage.getItem(SS_UNLOCKED) === "1") {
    document.documentElement.classList.add("unlocked");
  }

  // Apply saved theme (theme is also applied in <head> to avoid flash,
  // but we still need to set the correct icon here)
  const savedDark = localStorage.getItem(LS_THEME) === "dark";
  applyTheme(savedDark);

  const { token, gistId } = creds();
  if (!token || !gistId) openModal();

  setStatus("Loading…");
  try {
    await Promise.all([loadFeeds(), loadReadState()]);
    render();
  } catch (e) {
    setStatus(e.message, true);
  }
})();
</script>
</body>
</html>
