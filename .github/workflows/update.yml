name: Update Feeds

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Fetch feeds
        run: python fetch_feeds.py

      - name: Commit feeds.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds.json
          git diff --cached --quiet || git commit -m "chore: update feeds.json [skip ci]"
          git push
